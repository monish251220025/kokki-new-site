<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Contact Monish at Kokki to discuss precision manufacturing requirements, supplier orchestration, tooling, and production scale-up.">
    <meta name="robots" content="index,follow">
    <meta name="theme-color" content="#0c0c0c">
    <link rel="canonical" href="https://www.kokkiusa.com/contact.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Kokki">
    <meta property="og:title" content="Contact Monish | Kokki">
    <meta property="og:description" content="Share your project requirements and connect directly with Kokki for rapid manufacturing execution.">
    <meta property="og:url" content="https://www.kokkiusa.com/contact.html">
    <meta property="og:image" content="https://www.kokkiusa.com/Images/founder-mon.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Contact Monish | Kokki">
    <meta name="twitter:description" content="Share your project requirements and connect directly with Kokki for rapid manufacturing execution.">
    <meta name="twitter:image" content="https://www.kokkiusa.com/Images/founder-mon.png">
    <meta name="ga4-measurement-id" content="">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <title>Contact Monish | Kokki</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="contact-page">
    <div class="scan-overlay" aria-hidden="true"></div>
    <div class="noise-overlay" aria-hidden="true"></div>

    <section class="contact-wrap">
        <div class="container contact-container">
            <a class="back-home" href="index.html#hero" aria-label="Back to homepage">← Back to Kokki</a>
            <h1>Contact Monish</h1>
            <p>Please share your requirements and project details in the form below.</p>

            <form class="contact-form" action="https://formsubmit.co/monish.g@tamu.edu" method="post">
                <input type="hidden" name="_subject" value="Kokki Website Inquiry">
                <input type="hidden" name="_captcha" value="false">
                <input type="text" name="_honey" tabindex="-1" autocomplete="off" style="position:absolute;left:-9999px;opacity:0;">
                <div class="form-grid">
                    <label>
                        Name
                        <input type="text" name="Name" required>
                    </label>
                    <label>
                        Country
                        <input type="text" name="Country" required>
                    </label>
                    <label>
                        Title
                        <input type="text" name="Title" required>
                    </label>
                    <label>
                        Company
                        <input type="text" name="Company" required>
                    </label>
                    <label>
                        Email
                        <input type="email" name="Email" required>
                    </label>
                </div>
                <label>
                    Topic of Interest
                    <select name="TopicOfInterest" required>
                        <option value="" selected disabled>Select a topic</option>
                        <option value="Die Casting">Die Casting</option>
                        <option value="Machining">Machining</option>
                        <option value="Compression Molding">Compression Molding</option>
                        <option value="Injection Molding">Injection Molding</option>
                        <option value="Program Management">Program Management</option>
                        <option value="General Inquiry">General Inquiry</option>
                    </select>
                </label>
                <label>
                    Message
                    <textarea name="Message" rows="5" required></textarea>
                </label>
                <button class="btn btn-primary" type="submit">Send to Monish</button>
            </form>
        </div>
    </section>
    <script src="script.js" defer></script>
</body>
</html>
